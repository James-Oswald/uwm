name: Marker [Add/Remove/Change] Request
description: Request a manual marker removal, addition, or replacement in the cache build.
title: "Marker [Add/Remove/Change]: [Marker Name]"
labels:
  - cache-override
  - marker-override
body:
  - type: markdown
    attributes:
      value: |
        Submit marker overrides only in this form.
        If you include both a deletion and an addition for the same spot, the cache builder will treat that as a replacement.
        After review, apply the `approved-override` label to merge it into `overrides/manual-overrides.json`.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short explanation of what should change and why.
      placeholder: The seaskipper marker in Nemract is misplaced and should be moved to the dock.
    validations:
      required: true
  - type: textarea
    id: markers_to_delete
    attributes:
      label: Markers to delete
      description: JSON array of marker locations to remove. Use coordinates because many markers share the same name.
      value: |
        [
          {
            "x": 123,
            "z": -456
          }
        ]
      render: json
    validations:
      required: true
  - type: textarea
    id: markers_to_add
    attributes:
      label: Markers to add
      description: |
        JSON array of markers to add. Each marker should include `name`, `x`, `z`, and `icon`.
        Use one of the supported map category keys for `icon`:
        - `quest`: Quests
        - `location`: Locations
        - `bank`: Banks
        - `travel-fast`: Fast Travel
        - `travel-seaskipper`: Sea Skipper
        - `housing-ballon`: Housing Ballon
        - `blacksmith`: Blacksmiths
        - `potion`: Potions
        - `scroll-merchant`: Scroll Merchants
        - `merchant`: Vendors
        - `identifier`: Identifiers
        - `station`: Stations
        - `cave`: Caves
        - `dungeon`: Dungeons
        - `boss-altar`: Boss Altars
        - `raid`: Raids
        - `misc`: Other
      value: |
        [
          {
            "name": "Example Marker",
            "icon": "travel-seaskipper",
            "x": 124,
            "z": -456
          }
        ]
      render: json
    validations:
      required: true
