name: Quest override / fix request
description: Request a manual quest removal, addition, or replacement in the cache build.
title: "Override [Quest]: "
labels:
  - cache-override
  - quest-override
body:
  - type: markdown
    attributes:
      value: |
        Submit quest overrides only in this form.
        Quests are scraped from the wiki, so prefer fixing the wiki first when possible.
        Use this override flow when a wiki fix is not practical because of quest structure or similar limitations.
        If you include both a deletion and an addition for the same quest, the cache builder will treat that as a replacement.
        After review, apply the `approved-override` label to merge it into `overrides/manual-overrides.json`.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short explanation of the quest change and why it is needed.
      placeholder: The quest route is missing its final stages and needs a corrected replacement path.
    validations:
      required: true
  - type: textarea
    id: quests_to_delete
    attributes:
      label: Quests to delete
      description: JSON array of quest names to remove.
      value: |
        [
          "Example Quest"
        ]
      render: json
    validations:
      required: true
  - type: textarea
    id: quests_to_add
    attributes:
      label: Quests to add
      description: JSON array of quests to add. Each quest should include `title` and a `points` array with 2D `x` and `y` map coordinates. Point `label` is optional.
      value: |
        [
          {
            "title": "Example Quest",
            "points": [
              { "label": "Stage 1", "x": 100, "y": 200 },
              { "label": "Stage 2", "x": 120, "y": 240 }
            ]
          }
        ]
      render: json
    validations:
      required: true
