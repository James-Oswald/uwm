name: Quest override request
description: Request a manual quest removal, addition, or replacement in the cache build.
title: "[Override][Quest]: "
labels:
  - cache-override
  - quest-override
body:
  - type: markdown
    attributes:
      value: |
        Submit JSON arrays for the quests you want removed or added.
        Quest additions should include a `title` and a `points` array with `x` and `z` coordinates for each stage.
        After review, apply the `approved-override` label to merge it into `cache/manual-overrides.json`.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short explanation of the quest change and why it is needed.
      placeholder: The quest route is missing its final stage and needs a corrected replacement path.
    validations:
      required: true
  - type: textarea
    id: markers_to_delete
    attributes:
      label: Markers to delete
      description: Leave this as `[]` for quest-only requests.
      value: |
        []
      render: json
    validations:
      required: true
  - type: textarea
    id: markers_to_add
    attributes:
      label: Markers to add
      description: Leave this as `[]` for quest-only requests.
      value: |
        []
      render: json
    validations:
      required: true
  - type: textarea
    id: quests_to_delete
    attributes:
      label: Quests to delete
      description: JSON array of quest titles or objects with a `title` field.
      value: |
        [
          "Example Quest"
        ]
      render: json
    validations:
      required: true
  - type: textarea
    id: quests_to_add
    attributes:
      label: Quests to add
      description: JSON array of quest objects. Each quest should include `title` and `points`. Optional fields are `pageType`, `categories`, and point `label`/`y`.
      value: |
        [
          {
            "title": "Example Quest",
            "pageType": "quest",
            "points": [
              { "label": "Stage 1", "x": 100, "y": 64, "z": 200 },
              { "label": "Stage 2", "x": 120, "y": 65, "z": 240 }
            ]
          }
        ]
      render: json
    validations:
      required: true
